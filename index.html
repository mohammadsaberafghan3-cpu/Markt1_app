<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>سامانه جامع انبار و بازار</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/moment-jalaali@0.9.2/moment-jalaali.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: radial-gradient(circle at top left, #1e2f3b, #0a1a1f);
            min-height: 100vh;
            padding: 0;
            margin: 0;
            color: #f0f4f8;
        }
        .marquee-bar {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            padding: 8px 16px;
            text-align: center;
            font-size: 0.85rem;
            color: #ffebc2;
            border-bottom: 1px solid rgba(255,215,150,0.3);
            white-space: nowrap;
            overflow-x: auto;
            direction: ltr;
        }
        .marquee-content {
            display: inline-block;
            animation: marquee 18s linear infinite;
            font-weight: 500;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .app-container {
            max-width: 560px;
            margin: 0 auto;
            padding: 12px;
            position: relative;
        }
        .glass-header {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 10px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-img {
            width: 44px;
            height: 44px;
            object-fit: cover;
            border-radius: 30px;
            background: white;
            padding: 4px;
        }
        .menu-icon {
            font-size: 28px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            transition: 0.2s;
        }
        .side-menu {
            position: fixed;
            top: 0;
            right: -280px;
            width: 260px;
            height: 100%;
            background: rgba(20,30,35,0.95);
            backdrop-filter: blur(24px);
            z-index: 1000;
            transition: 0.3s ease;
            padding: 70px 16px 30px;
            box-shadow: -4px 0 20px rgba(0,0,0,0.4);
            border-left: 1px solid rgba(255,255,255,0.2);
        }
        .side-menu.open { right: 0; }
        .side-menu a {
            display: block;
            padding: 14px 16px;
            color: #f0f4f8;
            text-decoration: none;
            font-weight: 500;
            border-radius: 40px;
            margin: 8px 0;
            transition: 0.2s;
        }
        .side-menu a i { width: 28px; margin-left: 12px; }
        .side-menu a:hover { background: rgba(255,255,255,0.2); }
        .close-menu {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 26px;
            cursor: pointer;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        .glass-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.2s;
        }
        .btn {
            background: #2c7da0;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            width: 100%;
            font-family: 'Vazirmatn';
            margin-top: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #5aa9c4;
            color: #cce7f0;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
            width: auto;
            display: inline-block;
            margin: 4px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0 12px;
            border-radius: 28px;
            border: none;
            background: rgba(255,255,255,0.9);
            font-family: 'Vazirmatn';
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .product-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 16px;
            background: #ddd;
        }
        table {
            width: 100%;
            font-size: 0.8rem;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px 6px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            text-align: right;
        }
        .badge {
            background: #ffb347;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            display: inline-block;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1100;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
        }
        .modal.active { visibility: visible; }
        .modal-content {
            background: rgba(30,40,45,0.95);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
        }
        .float-lang {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 8px 12px;
            font-size: 12px;
            z-index: 800;
            cursor: pointer;
        }
        .user-item {
            background: rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 12px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
<div id="marqueeBar" class="marquee-bar"><span class="marquee-content"></span></div>
<div class="app-container" id="appRoot"></div>
<div class="side-menu" id="sideMenu">
    <div class="close-menu" id="closeMenuBtn"><i class="fas fa-times"></i></div>
    <div id="menuLinks"></div>
</div>
<div class="overlay" id="overlay"></div>
<div class="float-lang" id="langBtn">🌐 فارسی</div>

<script>
    // ---------- داده‌های اصلی ----------
    let products = JSON.parse(localStorage.getItem('products')) || [];
    let shops = JSON.parse(localStorage.getItem('shops')) || [];
    let inventories = JSON.parse(localStorage.getItem('inventories')) || [];
    let messages = JSON.parse(localStorage.getItem('messages')) || [];
    let users = JSON.parse(localStorage.getItem('users')) || [];
    let settings = JSON.parse(localStorage.getItem('settings')) || {
        adminPass: 'admin123',
        logo: '',
        language: 'fa',
        marqueeMessages: ['✨ به سامانه خوش آمدید', '📈 امروز هم موفق باشید', '🧩 هوشمندانه خرید کنید', '💡 بازار را زیر نظر داشته باش', '🔥 بدون موجودی، فروش نداریم']
    };
    
    if (users.length === 0) {
        users.push({ id: 'u1', username: 'karam', password: '123', role: 'user' });
        users.push({ id: 'u2', username: 'sara', password: '123', role: 'user' });
        localStorage.setItem('users', JSON.stringify(users));
    }
    
    let currentUser = null;
    
    function getJalaali() {
        return moment().format('jYYYY/jMM/jDD - HH:mm');
    }
    function saveAll() {
        localStorage.setItem('products', JSON.stringify(products));
        localStorage.setItem('shops', JSON.stringify(shops));
        localStorage.setItem('inventories', JSON.stringify(inventories));
        localStorage.setItem('messages', JSON.stringify(messages));
        localStorage.setItem('users', JSON.stringify(users));
        localStorage.setItem('settings', JSON.stringify(settings));
    }
    function updateMarquee() {
        const msgs = settings.marqueeMessages;
        const randomMsg = msgs[Math.floor(Math.random() * msgs.length)];
        const marqueeSpan = document.querySelector('.marquee-content');
        if (marqueeSpan) marqueeSpan.innerText = randomMsg + '   ★   ' + randomMsg;
    }
    
    function render() {
        if (!currentUser) { renderLogin(); return; }
        const isAdmin = currentUser.role === 'admin';
        let menuHtml = '';
        const menuItems = [
            { id: 'dashboard', icon: '📊', labelFa: 'داشبورد', labelEn: 'Dashboard' },
            { id: 'products', icon: '📦', labelFa: 'محصولات', labelEn: 'Products' },
            { id: 'inventory', icon: '📝', labelFa: 'موجودی', labelEn: 'Inventory' },
            { id: 'reports', icon: '📈', labelFa: 'گزارشات', labelEn: 'Reports' }
        ];
        if (isAdmin) {
            menuItems.push({ id: 'shops', icon: '🏪', labelFa: 'مغازه‌ها', labelEn: 'Shops' });
            menuItems.push({ id: 'messagesPanel', icon: '💬', labelFa: 'پیام‌ها', labelEn: 'Messages' });
            menuItems.push({ id: 'settings', icon: '⚙️', labelFa: 'تنظیمات', labelEn: 'Settings' });
        }
        menuItems.push({ id: 'logout', icon: '🚪', labelFa: 'خروج', labelEn: 'Logout' });
        for(let item of menuItems) {
            let label = settings.language === 'fa' ? item.labelFa : item.labelEn;
            let iconClass = '';
            if (item.icon === '📊') iconClass = 'fa-chart-line';
            else if (item.icon === '📦') iconClass = 'fa-box';
            else if (item.icon === '📝') iconClass = 'fa-pen';
            else if (item.icon === '📈') iconClass = 'fa-chart-simple';
            else if (item.icon === '🏪') iconClass = 'fa-store';
            else if (item.icon === '💬') iconClass = 'fa-message';
            else if (item.icon === '⚙️') iconClass = 'fa-gear';
            else iconClass = 'fa-sign-out-alt';
            menuHtml += `<a href="#" data-view="${item.id}"><i class="fas ${iconClass}"></i> ${label}</a>`;
        }
        document.getElementById('menuLinks').innerHTML = menuHtml;
        const logoHtml = settings.logo ? `<img src="${settings.logo}" class="logo-img" alt="logo">` : `<i class="fas fa-chart-line" style="font-size:32px;"></i>`;
        const displayName = isAdmin ? 'مدیر' : currentUser.username;
        document.getElementById('appRoot').innerHTML = `
            <div class="glass-header">
                <div class="logo-area">${logoHtml}<span style="font-weight:bold;">سامانه بازار</span></div>
                <div style="display:flex; gap:8px; align-items:center;">
                    <span style="font-size:12px;">${displayName}</span>
                    <div class="menu-icon" id="menuIcon"><i class="fas fa-bars"></i></div>
                </div>
            </div>
            <div id="mainView" class="glass-card"></div>
        `;
        document.getElementById('menuIcon').onclick = () => { document.getElementById('sideMenu').classList.add('open'); document.getElementById('overlay').style.display = 'block'; };
        document.getElementById('closeMenuBtn').onclick = closeMenu;
        document.getElementById('overlay').onclick = closeMenu;
        document.querySelectorAll('[data-view]').forEach(link => {
            link.onclick = (e) => {
                e.preventDefault();
                const view = link.dataset.view;
                if(view === 'logout') { currentUser = null; render(); closeMenu(); return; }
                showView(view, isAdmin);
                closeMenu();
            };
        });
        showView('dashboard', isAdmin);
        updateMarquee();
    }
    function closeMenu() {
        document.getElementById('sideMenu').classList.remove('open');
        document.getElementById('overlay').style.display = 'none';
    }
    function showView(view, isAdmin) {
        const container = document.getElementById('mainView');
        if(view === 'dashboard') container.innerHTML = renderDashboard();
        else if(view === 'products') container.innerHTML = renderProducts(isAdmin);
        else if(view === 'shops' && isAdmin) container.innerHTML = renderShops();
        else if(view === 'inventory') container.innerHTML = renderInventory(isAdmin);
        else if(view === 'reports') container.innerHTML = renderReports();
        else if(view === 'messagesPanel' && isAdmin) container.innerHTML = renderAdminMessages();
        else if(view === 'settings' && isAdmin) container.innerHTML = renderSettings();
        attachViewEvents(isAdmin);
    }
    
    function renderDashboard() {
        let totalStock = inventories.reduce((a,b)=>a+b.quantity,0);
        return `<div style="text-align:center"><i class="fas fa-chart-pie" style="font-size:40px;"></i><h3>${settings.language==='fa'?'خلاصه سریع':'Quick Stats'}</h3></div>
        <div class="grid-2">
            <div class="glass-card">📦 ${products.length} محصول</div>
            <div class="glass-card">🏪 ${shops.length} مغازه</div>
            <div class="glass-card">📊 موجودی کل: ${totalStock}</div>
            <div class="glass-card">🕒 ${getJalaali()}</div>
        </div>
        <div class="glass-card">🔔 <strong>${settings.language==='fa'?'آخرین فعالیت‌ها':'Latest'}</strong><br>${inventories.slice(-3).map(i=>`محصول ${products.find(p=>p.id===i.productId)?.name||''} بروز شد`).join('<br>')||'--'}</div>`;
    }
    function renderProducts(isAdmin) {
        let html = `<div style="background:rgba(255,255,255,0.2);border-radius:40px;padding:8px; margin-bottom:12px;"><i class="fas fa-search"></i><input type="text" id="searchProd" placeholder="جستجو" style="background:transparent; color:white;"></div><div id="prodList">`;
        products.forEach(p => {
            html += `<div class="glass-card" style="display:flex; gap:12px; align-items:center;">
                        <img src="${p.image || 'https://via.placeholder.com/50'}" class="product-img" onerror="this.src='https://via.placeholder.com/50'">
                        <div style="flex:1"><strong>${p.name}</strong><br>${p.unit} - ${p.price?.toLocaleString()} تومان</div>
                        ${isAdmin ? `<div><button class="editProd" data-id="${p.id}" style="background:#2c7da0; border:none; padding:6px 12px; border-radius:20px; margin:2px;"><i class="fas fa-edit"></i></button>
                        <button class="delProd" data-id="${p.id}" style="background:#e63946; border:none; padding:6px 12px; border-radius:20px;"><i class="fas fa-trash"></i></button></div>` : ''}
                    </div>`;
        });
        html += `</div>${isAdmin ? `<button id="showAddProductModalBtn" class="btn"><i class="fas fa-plus"></i> افزودن محصول</button>` : ''}`;
        return html;
    }
    function renderShops() {
        let html = `<div id="shopsList">`;
        shops.forEach(s => {
            html += `<div class="glass-card"><strong>${s.name}</strong><br>${s.address}<br>
            <button class="editShopBtn" data-id="${s.id}" style="background:#2c7da0; border:none; padding:6px 12px; border-radius:20px;">✏️ ویرایش</button>
            <button class="delShopBtn" data-id="${s.id}" style="background:#e63946; border:none; padding:6px 12px; border-radius:20px;">🗑️ حذف</button></div>`;
        });
        html += `<button id="showAddShopModalBtn" class="btn">➕ افزودن مغازه</button></div>`;
        return html;
    }
    function renderInventory(isAdmin) {
        if(!isAdmin) {
            let html = `<h3>📋 موجودی فعلی</h3>`;
            for(let s of shops) {
                html += `<div class="glass-card"><strong>${s.name}</strong><br>`;
                for(let p of products) {
                    let inv = inventories.find(i=>i.productId===p.id && i.shopId===s.id);
                    html += `${p.name}: ${inv?.quantity || 0} ${p.unit}<br>`;
                }
                html += `</div>`;
            }
            return html;
        }
        return `<div class="grid-2"><select id="invProduct"><option>انتخاب محصول</option>${products.map(p=>`<option value="${p.id}">${p.name}</option>`)}</select>
        <select id="invShop"><option>انتخاب مغازه</option>${shops.map(s=>`<option value="${s.id}">${s.name}</option>`)}</select></div>
        <input type="number" id="invQty" placeholder="تعداد"><button id="saveInvBtn" class="btn">ثبت موجودی</button>
        <div id="invTable"></div>`;
    }
    function refreshInvTable() {
        const tbl = document.getElementById('invTable');
        if(!tbl) return;
        let html = `要要<th>محصول</th><th>مغازه</th><th>مقدار</th><th>عملیات</th></tr>`;
        inventories.forEach(inv=>{
            let p = products.find(pr=>pr.id===inv.productId);
            let s = shops.find(sh=>sh.id===inv.shopId);
            html += `<tr><td>${p?.name}</td><td>${s?.name}</td><td>${inv.quantity}</td><td><button class="delInv" data-p="${inv.productId}" data-s="${inv.shopId}" style="background:#e63946; border:none; padding:4px 10px; border-radius:20px;">حذف</button></td></tr>`;
        });
        html+=`再`;
        tbl.innerHTML = html;
        document.querySelectorAll('.delInv').forEach(btn=>{
            btn.onclick = ()=>{
                let pid = btn.dataset.p, sid = btn.dataset.s;
                inventories = inventories.filter(i=>!(i.productId===pid && i.shopId===sid));
                saveAll();
                refreshInvTable();
            };
        });
    }
    function renderReports() {
        return `<div class="glass-card"><button id="pdfReportBtn" class="btn"><i class="fas fa-file-pdf"></i> گرفتن گزارش PDF</button>
        <button id="exportJsonBtn" class="btn-outline btn">📤 خروجی JSON</button>
        <input type="file" id="importJsonInput" accept=".json" style="display:none">
        <button id="importJsonBtn" class="btn-outline btn">📥 وارد کردن دیتا</button></div>`;
    }
    function renderAdminMessages() {
        let msgHtml = `<div class="glass-card"><h3>ارسال پیام به کاربران یا مغازه‌ها</h3>
        <select id="msgTarget"><option value="allUsers">همه کاربران عادی</option>${shops.map(s=>`<option value="shop_${s.id}">مغازه: ${s.name}</option>`)}</select>
        <textarea id="msgText" rows="2" placeholder="متن پیام..."></textarea>
        <button id="sendMsgBtn" class="btn">ارسال</button></div>
        <div id="msgListAdmin"><h4>پیام‌های ارسالی (از مدیر و کاربران)</h4>`;
        if (messages.length === 0) msgHtml += `<div class="glass-card">پیامی وجود ندارد</div>`;
        else {
            messages.slice().reverse().forEach(m => {
                let targetName = '';
                if (m.target === 'allUsers') targetName = 'همه کاربران';
                else if (m.target.startsWith('shop_')) {
                    let shopId = m.target.replace('shop_','');
                    let shop = shops.find(s=>s.id===shopId);
                    targetName = `مغازه: ${shop?.name || 'نامشخص'}`;
                } else targetName = m.target;
                msgHtml += `<div class="glass-card"><strong>از: ${m.sender || 'سیستم'}</strong> به: ${targetName}<br>${m.text}<br><small>${m.date}</small></div>`;
            });
        }
        msgHtml += `</div>`;
        return msgHtml;
    }
    function renderSettings() {
        let usersHtml = `<div class="glass-card"><h3>👥 مدیریت کاربران عادی</h3><div id="usersList">`;
        users.forEach(u => {
            usersHtml += `<div class="user-item"><strong>${u.username}</strong> 
            <button class="editUserBtn btn-sm" data-id="${u.id}">ویرایش رمز</button>
            <button class="deleteUserBtn btn-sm btn-outline" data-id="${u.id}">حذف کاربر</button></div>`;
        });
        usersHtml += `<button id="addUserBtn" class="btn-sm btn">➕ افزودن کاربر جدید</button></div>`;
        
        return `<div class="glass-card"><h3>تنظیمات سیستم</h3>
        <label>رمز مدیر (admin)</label><input type="password" id="newAdminPass" placeholder="رمز جدید مدیر">
        <label>آپلود لوگو</label><input type="file" id="logoUpload" accept="image/*">
        <label>تغییر زبان</label><select id="langSelect"><option value="fa" ${settings.language==='fa'?'selected':''}>فارسی</option><option value="en" ${settings.language==='en'?'selected':''}>English</option></select>
        <button id="saveSettingsBtn" class="btn">ذخیره تنظیمات</button>
        <button id="resetDataBtn" class="btn-outline btn">بازنشانی همه داده‌ها</button>
        <h4>پیام‌های متحرک</h4>
        <textarea id="marqueeMsgs" rows="3">${settings.marqueeMessages.join('\n')}</textarea>
        <button id="saveMarqueeBtn" class="btn">ذخیره پیام‌ها</button>
        </div>
        ${usersHtml}`;
    }
    
    function attachViewEvents(isAdmin) {
        const addProdBtn = document.getElementById('showAddProductModalBtn');
        if(addProdBtn) addProdBtn.onclick = () => showProductModal();
        const addShopBtn = document.getElementById('showAddShopModalBtn');
        if(addShopBtn && isAdmin) addShopBtn.onclick = () => showShopModal();
        
        const saveInv = document.getElementById('saveInvBtn');
        if(saveInv) {
            saveInv.onclick = () => {
                let pid = document.getElementById('invProduct').value;
                let sid = document.getElementById('invShop').value;
                let qty = parseInt(document.getElementById('invQty').value);
                if(pid && sid && !isNaN(qty)) {
                    const idx = inventories.findIndex(i=>i.productId===pid && i.shopId===sid);
                    if(idx!==-1) inventories[idx] = {...inventories[idx], quantity: qty, lastUpdate: new Date()};
                    else inventories.push({productId:pid, shopId:sid, quantity:qty, lastUpdate:new Date()});
                    saveAll();
                    refreshInvTable();
                } else alert('لطفاً محصول، مغازه و تعداد را وارد کنید');
            };
            refreshInvTable();
        }
        document.querySelectorAll('.delProd').forEach(btn=>{
            btn.onclick = () => {
                let id = btn.dataset.id;
                if(confirm('حذف شود؟')) {
                    products = products.filter(p=>p.id!==id);
                    inventories = inventories.filter(i=>i.productId!==id);
                    saveAll();
                    showView('products',isAdmin);
                }
            };
        });
        document.querySelectorAll('.editProd').forEach(btn=>{
            btn.onclick = () => {
                let id = btn.dataset.id;
                let p = products.find(pr=>pr.id===id);
                let newName = prompt('نام جدید',p.name);
                if(newName) p.name = newName;
                let newPrice = parseInt(prompt('قیمت',p.price));
                if(!isNaN(newPrice)) p.price = newPrice;
                saveAll();
                showView('products',isAdmin);
            };
        });
        document.querySelectorAll('.editShopBtn').forEach(btn=>{
            btn.onclick = ()=>{
                let id = btn.dataset.id;
                let s = shops.find(sh=>sh.id===id);
                let newName = prompt('نام جدید',s.name);
                if(newName) s.name = newName;
                let newAddr = prompt('آدرس',s.address);
                if(newAddr) s.address = newAddr;
                saveAll();
                showView('shops',isAdmin);
            };
        });
        document.querySelectorAll('.delShopBtn').forEach(btn=>{
            btn.onclick = ()=>{
                let id = btn.dataset.id;
                if(confirm('مغازه حذف شود؟')) {
                    shops = shops.filter(s=>s.id!==id);
                    inventories = inventories.filter(i=>i.shopId!==id);
                    saveAll();
                    showView('shops',isAdmin);
                }
            };
        });
        const pdfBtn = document.getElementById('pdfReportBtn');
        if(pdfBtn) {
            pdfBtn.onclick = async () => {
                const { jsPDF } = window.jspdf;
                const dummy = document.createElement('div');
                dummy.style.background = 'white';
                dummy.style.color = 'black';
                dummy.style.padding = '20px';
                dummy.style.fontFamily = 'Vazirmatn';
                dummy.innerHTML = `<h2>گزارش انبار</h2>${products.map(p=>`<div>${p.name}: موجودی کل ${inventories.filter(i=>i.productId===p.id).reduce((a,b)=>a+b.quantity,0)} ${p.unit}</div>`).join('')}<br>تاریخ:${getJalaali()}`;
                document.body.appendChild(dummy);
                const canvas = await html2canvas(dummy);
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF();
                pdf.addImage(imgData, 'PNG', 10, 10, 180, 100);
                pdf.save('report.pdf');
                document.body.removeChild(dummy);
            };
        }
        const exportBtn = document.getElementById('exportJsonBtn');
        if(exportBtn) exportBtn.onclick = () => {
            const data = {products, shops, inventories, messages, users, settings};
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(data)],{type:'application/json'}));
            a.download = 'backup.json';
            a.click();
        };
        const importBtn = document.getElementById('importJsonBtn');
        const fileInput = document.getElementById('importJsonInput');
        if(importBtn && fileInput) {
            importBtn.onclick = () => fileInput.click();
            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = ev => {
                    const data = JSON.parse(ev.target.result);
                    if(data.products) products = data.products;
                    if(data.shops) shops = data.shops;
                    if(data.inventories) inventories = data.inventories;
                    if(data.messages) messages = data.messages;
                    if(data.users) users = data.users;
                    if(data.settings) Object.assign(settings, data.settings);
                    saveAll();
                    alert('داده وارد شد');
                    render();
                };
                reader.readAsText(file);
            };
        }
        const sendMsg = document.getElementById('sendMsgBtn');
        if(sendMsg) {
            sendMsg.onclick = () => {
                let target = document.getElementById('msgTarget').value;
                let text = document.getElementById('msgText').value;
                if(text) {
                    messages.push({id:Date.now(), sender: currentUser.username, target: target, text: text, date: getJalaali()});
                    saveAll();
                    showView('messagesPanel', true);
                } else alert('متن پیام را وارد کنید');
            };
        }
        const saveSet = document.getElementById('saveSettingsBtn');
        if(saveSet) {
            saveSet.onclick = () => {
                let newAdmin = document.getElementById('newAdminPass').value;
                if(newAdmin) settings.adminPass = newAdmin;
                settings.language = document.getElementById('langSelect').value;
                const logoFile = document.getElementById('logoUpload').files[0];
                if(logoFile) {
                    const reader = new FileReader();
                    reader.onload = e => { settings.logo = e.target.result; saveAll(); render(); };
                    reader.readAsDataURL(logoFile);
                }
                saveAll();
                alert('تنظیمات ذخیره شد');
                render();
            };
        }
        const resetBtn = document.getElementById('resetDataBtn');
        if(resetBtn) resetBtn.onclick = () => { if(confirm('همه چیز ریست می‌شود')){ localStorage.clear(); location.reload(); } };
        const saveMarquee = document.getElementById('saveMarqueeBtn');
        if(saveMarquee) {
            saveMarquee.onclick = () => {
                let lines = document.getElementById('marqueeMsgs').value.split('\n');
                settings.marqueeMessages = lines.filter(l=>l.trim());
                saveAll();
                updateMarquee();
                alert('پیام‌های متحرک ذخیره شد');
            };
        }
        document.querySelectorAll('.editUserBtn').forEach(btn => {
            btn.onclick = () => {
                let userId = btn.dataset.id;
                let user = users.find(u => u.id === userId);
                let newPass = prompt(`رمز جدید برای کاربر ${user.username} را وارد کنید`, user.password);
                if (newPass) { user.password = newPass; saveAll(); alert('رمز تغییر کرد'); renderSettings(); showView('settings', true); }
            };
        });
        document.querySelectorAll('.deleteUserBtn').forEach(btn => {
            btn.onclick = () => {
                let userId = btn.dataset.id;
                if (confirm('حذف کاربر؟')) {
                    users = users.filter(u => u.id !== userId);
                    saveAll();
                    renderSettings();
                    showView('settings', true);
                }
            };
        });
        const addUserBtn = document.getElementById('addUserBtn');
        if (addUserBtn) {
            addUserBtn.onclick = () => {
                let username = prompt('نام کاربری جدید:');
                if (username && !users.find(u => u.username === username)) {
                    let password = prompt('رمز عبور:');
                    if (password) {
                        users.push({ id: Date.now().toString(), username: username, password: password, role: 'user' });
                        saveAll();
                        renderSettings();
                        showView('settings', true);
                    }
                } else alert('نام کاربری تکراری یا نامعتبر');
            };
        }
    }
    
    function showProductModal() {
        let modalDiv = document.createElement('div');
        modalDiv.className = 'modal active';
        modalDiv.innerHTML = `<div class="modal-content"><h3>محصول جدید</h3>
        <input id="prodName" placeholder="نام محصول"><input id="prodUnit" placeholder="واحد"><input id="prodPrice" placeholder="قیمت تومان" type="number">
        <input type="file" id="prodImg" accept="image/*"><button id="confirmProdBtn" class="btn">ثبت</button><button id="closeModalBtn" class="btn-outline btn">بستن</button></div>`;
        document.body.appendChild(modalDiv);
        document.getElementById('closeModalBtn').onclick = () => modalDiv.remove();
        document.getElementById('confirmProdBtn').onclick = () => {
            let name = document.getElementById('prodName').value;
            let unit = document.getElementById('prodUnit').value;
            let price = parseInt(document.getElementById('prodPrice').value);
            let imgFile = document.getElementById('prodImg').files[0];
            if(name && unit && !isNaN(price)) {
                if(imgFile) {
                    let reader = new FileReader();
                    reader.onload = e => {
                        products.push({id:Date.now().toString(), name, unit, price, image:e.target.result});
                        saveAll();
                        modalDiv.remove();
                        render();
                    };
                    reader.readAsDataURL(imgFile);
                } else {
                    products.push({id:Date.now().toString(), name, unit, price, image:''});
                    saveAll();
                    modalDiv.remove();
                    render();
                }
            } else alert('نام، واحد و قیمت اجباری است');
        };
    }
    function showShopModal() {
        let modalDiv = document.createElement('div');
        modalDiv.className = 'modal active';
        modalDiv.innerHTML = `<div class="modal-content"><h3>مغازه جدید</h3><input id="shopName" placeholder="نام مغازه"><input id="shopAddr" placeholder="آدرس"><button id="confirmShopBtn" class="btn">ثبت</button><button id="closeShopModal" class="btn-outline btn">بستن</button></div>`;
        document.body.appendChild(modalDiv);
        document.getElementById('closeShopModal').onclick = () => modalDiv.remove();
        document.getElementById('confirmShopBtn').onclick = () => {
            let name = document.getElementById('shopName').value;
            let addr = document.getElementById('shopAddr').value;
            if(name) {
                shops.push({id:Date.now().toString(), name, address:addr});
                saveAll();
                modalDiv.remove();
                render();
            } else alert('نام مغازه الزامی است');
        };
    }
    
    // صفحه لاگین بدون هیچ متن اضافی (بدون راهنما و بدون دکمه بازنشانی)
    function renderLogin() {
        document.getElementById('appRoot').innerHTML = `
            <div class="glass-card" style="margin-top:20%;text-align:center">
                <i class="fas fa-chart-line" style="font-size:48px; color:#5aa9c4;"></i>
                <h3>سامانه جامع انبار</h3>
                <p>ورود به پنل</p>
                <input type="text" id="loginUsername" placeholder="نام کاربری">
                <input type="password" id="loginPassword" placeholder="رمز عبور">
                <button id="doLoginBtn" class="btn">ورود</button>
            </div>
        `;
        document.getElementById('doLoginBtn').onclick = () => {
            let username = document.getElementById('loginUsername').value.trim();
            let password = document.getElementById('loginPassword').value;
            if (username === 'admin' && password === settings.adminPass) {
                currentUser = { role: 'admin', username: 'admin' };
                render();
            } else {
                let user = users.find(u => u.username === username && u.password === password);
                if (user) {
                    currentUser = { role: 'user', username: user.username, id: user.id };
                    render();
                } else {
                    alert('نام کاربری یا رمز عبور اشتباه است');
                }
            }
        };
    }
    
    if (products.length === 0) {
        products = [{id:'1', name:'کنسرو لوبیا', unit:'قوطی', price:28000, image:''},{id:'2', name:'برنج طارم', unit:'کیلو', price:85000, image:''}];
        shops = [{id:'s1', name:'مرکزی', address:'تهران'},{id:'s2', name:'شمال', address:'میدان'}];
        inventories = [{productId:'1', shopId:'s1', quantity:120, lastUpdate:new Date()},{productId:'2', shopId:'s1', quantity:55, lastUpdate:new Date()}];
        saveAll();
    }
    render();
</script>
</body>
</html>
